    <text x="522" y="614" fill="#9DA8E9" font-family="Arial, Helvetica, sans-serif" font-size="22">HYPE</text>
    <text x="522" y="668" fill="#52E5C7" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">28</text>

